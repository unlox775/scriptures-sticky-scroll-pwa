<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Scripture Reader PWA</title>
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <button id="homeButton" class="header-btn">Home</button>
        <div id="breadcrumb" class="breadcrumb">Standard Works Reader</div>
        <button id="addBookmarkButton" class="header-btn ribbon-plus-btn" title="Add Bookmark" hidden>
          <span class="ribbon-plus-icon" aria-hidden="true">+</span>
        </button>
        <button id="moveBookmarkButton" class="header-btn" title="Move bookmark to current location" hidden aria-label="Move bookmark to current location">↻</button>
        <button id="autoScrollStart" class="header-btn">Auto-scroll</button>
        <button id="showChaptersButton" class="header-btn">Chapters</button>
        <button id="installButton" class="header-btn" hidden>Install</button>
      </header>

      <main class="app-main">
        <section id="homeView" class="view"></section>
        <section id="booksView" class="view" hidden></section>
        <section id="chaptersView" class="view" hidden></section>
        <section id="historyView" class="view" hidden></section>

        <section id="readerView" class="view reader-view" hidden>
          <div id="autoScrollPanel" class="auto-scroll-panel" hidden>
            <button id="autoScrollStop" class="stop-btn" aria-label="Stop auto-scroll">×</button>
            <label for="autoScrollSpeed">Speed</label>
            <div class="auto-scroll-slider-wrap">
              <input id="autoScrollSpeed" type="range" min="8" max="100" step="5" value="90" />
            </div>
            <span id="autoScrollSpeedLabel">90 px/s</span>
          </div>
          <div id="bookmarkRibbons" class="bookmark-ribbons" aria-hidden="true"></div>
          <div class="reader-status">
            <span id="currentReference">Reference: -</span>
            <span id="bookmarkStatus"></span>
          </div>
          <div id="readerScroller" class="reader-scroller">
            <div id="readerRibbonsOverlay" class="reader-ribbons-overlay" aria-hidden="true"></div>
            <div id="readerContent" class="reader-content"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
